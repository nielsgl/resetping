name: Release

on:
  workflow_dispatch:
    inputs:
      free_mode:
        description: "Skip Apple Developer signing/notarization steps"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build_macos:
    runs-on: macos-latest
    env:
      CODESIGN_IDENTITY: ${{ vars.CODESIGN_IDENTITY }}
      NOTARY_PROFILE_NAME: ${{ vars.NOTARY_PROFILE_NAME }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: "v1"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ runner.os }}-${{ runner.arch }}-src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Import signing certificate
        if: ${{ !inputs.free_mode }}
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$APPLE_CERTIFICATE_P12"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain

      - name: Configure notary credentials
        if: ${{ !inputs.free_mode }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_B64: ${{ secrets.APPLE_API_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER_ID"
          test -n "$APPLE_API_PRIVATE_KEY_B64"
          mkdir -p private_keys
          echo "$APPLE_API_PRIVATE_KEY_B64" | base64 --decode > private_keys/AuthKey.p8
          xcrun notarytool store-credentials "$NOTARY_PROFILE_NAME" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --key private_keys/AuthKey.p8

      - name: Write Tauri updater signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/resetping.key"

      - name: Build macOS app
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/resetping.key")"
          npm run tauri -- build --bundles app,dmg

      - name: Ad-hoc sign app bundle (free mode)
        if: ${{ inputs.free_mode }}
        run: |
          set -euo pipefail
          APP_PATH="src-tauri/target/release/bundle/macos/ResetPing.app"
          test -d "$APP_PATH"
          /usr/bin/codesign --force --deep --sign - "$APP_PATH"

      - name: Verify updater artifacts
        run: |
          set -euo pipefail
          find src-tauri/target/release/bundle -name '*.sig' -print
          test -n "$(find src-tauri/target/release/bundle -name '*.sig' -print -quit)"

      - name: Notarize and staple
        if: ${{ !inputs.free_mode }}
        run: |
          set -euo pipefail
          ditto -c -k --keepParent "src-tauri/target/release/bundle/macos/ResetPing.app" ResetPing.zip
          xcrun notarytool submit ResetPing.zip --keychain-profile "$NOTARY_PROFILE_NAME" --wait
          xcrun stapler staple "src-tauri/target/release/bundle/macos/ResetPing.app"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz*

  build_windows:
    runs-on: windows-latest
    env:
      TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: "v1"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ runner.os }}-${{ runner.arch }}-src-tauri

      - name: Install LLVM
        run: choco install llvm -y --no-progress

      - name: Configure LLVM
        run: |
          echo "LIBCLANG_PATH=C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_ENV
          echo "C:\\Program Files\\LLVM\\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: npm ci

      - name: Write Tauri updater signing key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/resetping.key"

      - name: Build Windows bundles
        shell: bash
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/resetping.key")"
          npm run tauri -- build --bundles nsis,msi

      - name: Verify updater artifacts
        shell: bash
        run: |
          set -euo pipefail
          find src-tauri/target/release/bundle -name '*.sig' -print
          test -n "$(find src-tauri/target/release/bundle -name '*.sig' -print -quit)"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe*
            src-tauri/target/release/bundle/msi/*.msi*

  build_linux:
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-24.04, ubuntu-24.04-arm]
    runs-on: ${{ matrix.platform }}
    env:
      TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_B64: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_B64 }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_VERSION: "v1"
      SCCACHE_IGNORE_SERVER_IO_ERROR: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: ${{ runner.os }}-${{ runner.arch }}-src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf libfuse2 xdg-utils

      - name: Install dependencies
        run: npm ci

      - name: Write Tauri updater signing key
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_SIGNING_PRIVATE_KEY_B64" | base64 --decode > "$HOME/.tauri/resetping.key"

      - name: Build Linux bundles
        run: |
          set -euo pipefail
          export TAURI_SIGNING_PRIVATE_KEY
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$HOME/.tauri/resetping.key")"
          npm run tauri -- build --bundles appimage

      - name: Verify updater artifacts
        run: |
          set -euo pipefail
          find src-tauri/target/release/bundle -name '*.sig' -print
          test -n "$(find src-tauri/target/release/bundle -name '*.sig' -print -quit)"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage*

  publish:
    needs: [build_macos, build_windows, build_linux]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Compute version
        id: version
        run: |
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('src-tauri/tauri.conf.json').read_text())
          print(data['version'])
          PY
          )
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          mapfile -t RAW_FILES < <(find release-artifacts -type f | sort)
          if [ ${#RAW_FILES[@]} -eq 0 ]; then
            echo "No artifacts found"
            exit 1
          fi

          STAGE_DIR="$(mktemp -d)"
          declare -A BASENAME_COUNT
          FILES=()
          for file in "${RAW_FILES[@]}"; do
            base="$(basename "$file")"
            BASENAME_COUNT["$base"]=$(( ${BASENAME_COUNT["$base"]:-0} + 1 ))
            idx="${BASENAME_COUNT["$base"]}"
            if [ "$idx" -eq 1 ]; then
              FILES+=("$file")
              continue
            fi

            rel="${file#release-artifacts/}"
            artifact_group="${rel%%/*}"
            if [[ "$base" == *.* ]]; then
              stem="${base%.*}"
              suffix=".${base##*.}"
            else
              stem="$base"
              suffix=""
            fi
            staged="$STAGE_DIR/${stem}-${artifact_group}-${idx}${suffix}"
            cp "$file" "$staged"
            FILES+=("$staged")
          done

          MAC_UPDATER_ARCHIVE="$(find release-artifacts -type f -name 'ResetPing.app.tar.gz' -print -quit)"
          if [ -z "$MAC_UPDATER_ARCHIVE" ]; then
            echo "Missing macOS updater archive (ResetPing.app.tar.gz)"
            exit 1
          fi
          MAC_UPDATER_SIG="${MAC_UPDATER_ARCHIVE}.sig"
          if [ ! -f "$MAC_UPDATER_SIG" ]; then
            echo "Missing macOS updater signature: $MAC_UPDATER_SIG"
            exit 1
          fi

          MAC_UPDATER_NAME="$(basename "$MAC_UPDATER_ARCHIVE")"
          MAC_UPDATER_SIGNATURE="$(tr -d '\r\n' < "$MAC_UPDATER_SIG")"
          MAC_UPDATER_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${MAC_UPDATER_NAME}"
          PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          cat > "$STAGE_DIR/latest.json" <<EOF
          {
            "version": "${VERSION}",
            "notes": "ResetPing release ${TAG}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${MAC_UPDATER_SIGNATURE}",
                "url": "${MAC_UPDATER_URL}"
              }
            }
          }
          EOF
          FILES+=("$STAGE_DIR/latest.json")

          gh release create "$TAG" \
            --title "ResetPing $TAG" \
            --notes "ResetPing release $TAG" \
            "${FILES[@]}"

  update_homebrew_tap:
    needs: [publish]
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.publish.outputs.tag }}
      VERSION: ${{ needs.publish.outputs.version }}
      TAP_REPO: nielsgl/homebrew-tap
    steps:
      - uses: actions/checkout@v5

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: tap

      - name: Resolve macOS DMG asset and checksum
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ASSET_NAME="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" --jq '.assets[] | select(.name | endswith(".dmg")) | .name' | head -n1)"
          if [ -z "$ASSET_NAME" ]; then
            echo "No .dmg asset found for ${TAG}"
            exit 1
          fi
          ASSET_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${ASSET_NAME}"
          curl -fL "$ASSET_URL" -o /tmp/resetping.dmg
          SHA256="$(sha256sum /tmp/resetping.dmg | awk '{print $1}')"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"
          echo "ASSET_URL=$ASSET_URL" >> "$GITHUB_ENV"
          echo "SHA256=$SHA256" >> "$GITHUB_ENV"

      - name: Update cask file
        run: |
          set -euo pipefail
          mkdir -p tap/Casks
          cat > tap/Casks/resetping.rb <<EOF
          cask "resetping" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "${ASSET_URL}",
                verified: "github.com/nielsgl/resetping/"
            name "ResetPing"
            desc "Tray notifier for Codex rate limit reset status"
            homepage "https://github.com/nielsgl/resetping"

            depends_on arch: :arm64
            depends_on macos: ">= :monterey"

            app "ResetPing.app"
          end
          EOF

      - name: Commit and push tap update
        working-directory: tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f Casks/resetping.rb ]; then
            echo "Expected Casks/resetping.rb to exist before commit."
            exit 1
          fi
          if [ -z "$(git status --porcelain -- Casks/resetping.rb)" ]; then
            echo "No cask changes to commit."
            exit 0
          fi
          git add Casks/resetping.rb
          git commit -m "chore(cask): update resetping ${VERSION}"
          git push origin HEAD:main
