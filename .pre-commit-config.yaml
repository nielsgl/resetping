minimum_pre_commit_version: "3.6.0"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-json
        exclude: ^tsconfig(\..*)?\.json$
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.8
    hooks:
      - id: actionlint
        files: ^\.github/workflows/.*\.ya?ml$

  - repo: local
    hooks:
      - id: rust-fmt-check
        name: Rust fmt check
        entry: bash -lc 'cd src-tauri && cargo fmt --check'
        language: system
        pass_filenames: false
        files: ^src-tauri/.*\.rs$

      - id: frontend-typecheck
        name: Frontend typecheck
        entry: bash -lc 'npm run typecheck'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-tests
        name: Frontend tests
        entry: bash -lc 'npm run test'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: rust-tests
        name: Rust tests
        entry: bash -lc 'cd src-tauri && cargo test'
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: rust-clippy
        name: Rust clippy
        entry: bash -lc 'cd src-tauri && cargo clippy -- -D warnings'
        language: system
        pass_filenames: false
        stages: [pre-push]
